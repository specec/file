<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
</head>
<body>
    <script>
        // === KONFIGURASI - GANTI INI! ===
        var GITHUB_USERNAME = "specec";
        var REPO_NAME = "file";
        // ================================
        
        // Ambil nomor issue dari URL
        var path = window.location.pathname;
        var parts = path.split('/');
        var issueNumber = parts[parts.length - 1];
        
        // Kalau ada nomor issue
        if (issueNumber && !isNaN(issueNumber)) {
            var apiUrl = "https://api.github.com/repos/" + GITHUB_USERNAME + "/" + REPO_NAME + "/issues/" + issueNumber;
            
            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    if (data.title && data.title.startsWith('http')) {
                        window.location.href = data.title;
                    } else {
                        document.body.innerHTML = "<h2>Error: Link tidak valid</h2>";
                    }
                })
                .catch(error => {
                    document.body.innerHTML = "<h2>Error: Gagal mengambil data</h2>";
                });
        } else {
            document.body.innerHTML = "<h2>Format salah. Gunakan: username.github.io/repo/nomor</h2>";
        }
    </script>
    
    <p>Mengarahkan...</p>
</body>
</html>
